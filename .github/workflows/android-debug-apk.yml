name: Android Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build -- --configLoader runner

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build debug APK
        run: |
          chmod +x android/gradlew
          ./android/gradlew -p android assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: powerfit-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Publish latest debug APK release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk powerfit-debug.apk
          gh release delete debug-apk-latest --yes --cleanup-tag || true
          gh release create debug-apk-latest powerfit-debug.apk \
            --title "PowerFit 360 APK de prueba" \
            --notes "APK debug generado automaticamente desde main. Usa este archivo solo para pruebas internas."
